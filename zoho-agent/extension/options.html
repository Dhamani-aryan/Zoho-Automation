<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zoho Workflow Agent</title>
    <style>
      :root {
        color: #17212b;
        background: #f7f8fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      main {
        max-width: 760px;
      }
      h1 {
        margin: 0 0 18px;
        font-size: 20px;
      }
      section {
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: white;
        padding: 16px;
      }
      label {
        display: block;
        margin-top: 14px;
        font-size: 13px;
        font-weight: 600;
      }
      input[type="text"],
      input[type="password"] {
        box-sizing: border-box;
        width: 100%;
        height: 38px;
        margin-top: 6px;
        border: 1px solid #cfd7e3;
        border-radius: 6px;
        padding: 0 10px;
        font-size: 13px;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 16px;
      }
      button {
        height: 38px;
        border: 1px solid #cfd7e3;
        border-radius: 6px;
        background: white;
        padding: 0 12px;
        cursor: pointer;
      }
      button.primary {
        border-color: #2563eb;
        background: #2563eb;
        color: white;
        font-weight: 700;
      }
      pre {
        overflow: auto;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        background: #f7f8fb;
        padding: 10px;
        font-size: 12px;
      }
      #message {
        min-height: 20px;
        margin-top: 12px;
        color: #5b6675;
        font-size: 13px;
      }
      #jobStatus {
        margin-top: 12px;
        font-size: 13px;
        font-weight: 600;
      }
      #jobHistory ol {
        margin: 8px 0 12px;
        padding-left: 18px;
        color: #5b6675;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Zoho Workflow Agent</h1>
      <section>
        <label>
          Backend URL
          <input id="backendUrl" type="text" value="http://localhost:3000" />
        </label>
        <label>
          Extension token
          <input id="token" type="password" placeholder="zext_..." />
        </label>
        <label class="row">
          <input id="enabled" type="checkbox" />
          Allow the agent to use this browser's Zoho session
        </label>
        <div class="row">
          <button id="save" class="primary" type="button">Save</button>
          <button id="handshake" type="button">Handshake</button>
          <button id="runOnce" type="button">Dry claim once</button>
        </div>
        <div id="message"></div>
        <div id="jobStatus"></div>
        <div id="jobHistory"></div>
        <pre id="status">Not connected.</pre>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
